services:
  sandbox:
    build:
      context: docker
      dockerfile: Dockerfile
    image: pi-sandbox/base
    container_name: pi-sandbox
    cpus: 2
    mem_limit: 4g
    pids_limit: 100
    network_mode: bridge
    read_only: true
    environment:
      - PI_HOME=/workspace/.pi
      - HOME=/workspace
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
    volumes:
      - memory:/workspace/.pi/memory
      - projects:/workspace
      - type: tmpfs
        target: /tmp
    working_dir: /workspace
    user: "1000:1000"
    stdin_open: true
    tty: true

volumes:
  memory:
  projects:
