services:
  sandbox:
    build:
      context: docker
      dockerfile: Dockerfile
    image: pi-sandbox/base
    container_name: pi-sandbox
    cpus: 2
    mem_limit: 4g
    pids_limit: 100
    network_mode: bridge
    read_only: true
    environment:
      - PI_HOME=/workspace/.pi
      - HOME=/workspace
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - GH_TOKEN=${GH_TOKEN:-}
    volumes:
      - sessions:/workspace/.pi/agent/sessions
      - memory:/workspace/.pi/memory
      - /Users/jenc/code/pi-sandbox/projects:/workspace/projects
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 500m
    working_dir: /workspace
    user: "1000:1000"
    stdin_open: true
    tty: true

volumes:
  sessions:
  memory:
