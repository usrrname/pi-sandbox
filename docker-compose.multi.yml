# Multi-Agent Docker Compose
# Usage: docker compose -f docker-compose.multi.yml [command]

services:
  primary:
    build:
      context: docker
      dockerfile: Dockerfile
    image: pi-sandbox/base
    container_name: primary
    cpus: 1.5
    mem_limit: 2g
    pids_limit: 50
    network_mode: bridge
    read_only: true
    environment:
      - PI_HOME=/workspace/.pi
      - HOME=/workspace
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
    volumes:
      - memory:/workspace/.pi
      - projects:/workspace
      - type: tmpfs
        target: /tmp
    working_dir: /workspace
    user: "1000:1000"
    stdin_open: true
    tty: true

  subagent:
    build:
      context: docker
      dockerfile: Dockerfile
    image: pi-sandbox/base
    container_name: subagent
    cpus: 0.5
    mem_limit: 1g
    pids_limit: 25
    network_mode: bridge
    read_only: true
    cap_drop: ALL
    security_opt:
      - no-new-privileges:true
    environment:
      - PI_HOME=/tmp/.pi
      - HOME=/tmp
    volumes:
      - type: tmpfs
        target: /tmp
    working_dir: /workspace
    user: "1000:1000"
    stdin_open: true
    tty: true
    # Subagent dies after task — no persistence

volumes:
  memory:
  projects:
